<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>__SUBJECT_NAME__ - Practice Test</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            zinc: {
              50: '#fafafa',
              100: '#f4f4f5',
              200: '#e4e4e7',
              300: '#d4d4d8',
              400: '#a1a1aa',
              500: '#71717a',
              600: '#52525b',
              700: '#3f3f46',
              800: '#27272a',
              900: '#18181b',
              950: '#09090b',
            }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .correct-anim { animation: fade-in 0.3s ease-out; }
    @keyframes fade-in { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-zinc-50 text-zinc-900 antialiased min-h-screen">
  <main class="mx-auto max-w-4xl px-6 py-12 md:py-20 min-h-[70vh]">
    
    <!-- Top Left Logo -->
    <div class="mb-10">
      <a href="https://knowmo.vercel.app/" target="_blank" class="inline-flex items-center gap-3 select-none" style="text-decoration: none;">
        <h1 class="font-extrabold tracking-tight leading-none" style="font-size: 28px;">
          <span class="text-zinc-500">Know</span><span class="text-zinc-900">Mo</span><span class="text-pink-600">.</span>
        </h1>
      </a>
    </div>

    <div class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
      <div>
        <h1 class="text-3xl font-extrabold tracking-tight flex items-center gap-3">
          __SUBJECT_NAME__
          <span class="inline-flex items-center rounded-full bg-zinc-200/60 px-3 py-1 text-sm font-semibold text-zinc-800">
            __SUBJECT_CODE__
          </span>
        </h1>
      </div>
      
      <div id="score-container" class="hidden flex items-center gap-3 bg-white px-4 py-2.5 rounded-xl border border-zinc-200 shadow-sm">
        <div class="flex flex-col text-right">
          <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-wider">Attempted</span>
          <span class="text-sm font-bold" id="attempted-count">0 / 0</span>
        </div>
        <div class="w-px h-8 bg-zinc-200 mx-1"></div>
        <div class="flex flex-col">
          <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-wider">Score</span>
          <span class="text-sm font-bold text-green-600" id="correct-count">0</span>
        </div>
      </div>
    </div>

    <div id="questions-container" class="space-y-8"></div>
    
    <div id="pagination-container" class="hidden flex items-center justify-center gap-2 mt-12 mb-8">
      <div class="flex items-center gap-4 bg-zinc-200/50 p-1.5 rounded-full">
        <button id="prev-btn" class="p-2 rounded-full bg-white shadow-sm text-zinc-900 disabled:opacity-50 transition-all flex items-center justify-center w-10 h-10 hover:bg-zinc-50 disabled:hover:bg-white">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <span class="text-sm font-semibold text-zinc-700 px-2" id="page-info">1 of 1</span>
        <button id="next-btn" class="p-2 rounded-full bg-zinc-900 text-white shadow-sm disabled:opacity-50 transition-all flex items-center justify-center w-10 h-10 hover:bg-zinc-800 disabled:hover:bg-zinc-900">
           <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </div>
    </div>

    <div id="final-result" class="hidden mt-8 rounded-3xl border border-zinc-200 bg-gradient-to-b from-white to-zinc-50 p-8 text-center shadow-lg">
      <div class="inline-flex h-16 w-16 items-center justify-center rounded-full bg-yellow-100 text-yellow-600 mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
      </div>
      <h2 class="text-2xl font-bold mb-2">Test Completed!</h2>
      <p class="text-zinc-500 mb-6">You scored <strong class="text-zinc-900" id="final-score">0</strong> out of <span id="final-total">0</span>.</p>
    </div>
  </main>

  <script>
    const questions = __QUESTIONS_DATA__;
    
    // Utility to prevent HTML injection glitch
    function escapeHtml(unsafe) {
      if (typeof unsafe !== 'string') return '';
      return unsafe
           .replace(/&/g, "&amp;")
           .replace(/</g, "&lt;")
           .replace(/>/g, "&gt;")
           .replace(/"/g, "&quot;")
           .replace(/'/g, "&#039;");
    }

    let selectedAnswers = {};
    const ITEMS_PER_PAGE = 20;
    let currentPage = 1;
    const totalPages = Math.ceil(questions.length / ITEMS_PER_PAGE);

    const qsContainer = document.getElementById('questions-container');
    const scoreContainer = document.getElementById('score-container');
    const attemptedCountEl = document.getElementById('attempted-count');
    const correctCountEl = document.getElementById('correct-count');
    const finalResultEl = document.getElementById('final-result');
    const finalScoreEl = document.getElementById('final-score');
    const finalTotalEl = document.getElementById('final-total');
    const paginationContainer = document.getElementById('pagination-container');
    const pageInfo = document.getElementById('page-info');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');

    function updateScore() {
      const attempted = Object.keys(selectedAnswers).length;
      let correct = 0;
      for (const idx in selectedAnswers) {
        if (selectedAnswers[idx] === questions[idx].correctAnswer) correct++;
      }
      
      if (attempted > 0) scoreContainer.classList.remove('hidden');
      attemptedCountEl.textContent = attempted + ' / ' + questions.length;
      correctCountEl.textContent = correct;

      if (attempted === questions.length && questions.length > 0) {
        finalResultEl.classList.remove('hidden');
        finalScoreEl.textContent = correct;
        finalTotalEl.textContent = questions.length;
      }
    }

    function handleOptionSelect(qIndex, optionRaw) {
      if (selectedAnswers[qIndex]) return;
      // We pass raw option via JSON parse trick to avoid quote breaking, 
      // but if we pass via string, it must match EXACTLY.
      selectedAnswers[qIndex] = questions[qIndex].options[optionRaw];
      renderQuestions();
      updateScore();
    }

    function renderQuestions() {
      qsContainer.innerHTML = '';
      
      const startIdx = (currentPage - 1) * ITEMS_PER_PAGE;
      const endIdx = Math.min(startIdx + ITEMS_PER_PAGE, questions.length);
      const currentQs = questions.slice(startIdx, endIdx);

      currentQs.forEach((q, i) => {
        const globalIdx = startIdx + i;
        const selected = selectedAnswers[globalIdx];
        const isAnswered = !!selected;
        const isCorrect = selected === q.correctAnswer;
        
        // Escape content safely
        const safeQuestion = escapeHtml(q.question);
        const safeExplanation = q.explanation ? escapeHtml(q.explanation) : '';
        const safeCorrectAnswer = escapeHtml(q.correctAnswer);

        const qDiv = document.createElement('div');
        qDiv.className = 'rounded-3xl border p-6 md:p-8 transition-all shadow-sm ';
        if (isAnswered) {
          qDiv.className += isCorrect ? 'border-green-200/60 bg-green-50/20' : 'border-red-200/60 bg-red-50/20';
        } else {
          qDiv.className += 'border-zinc-200 bg-white';
        }

        let html = '<div class="mb-6 flex gap-4"><div class="flex-shrink-0 flex h-8 w-8 items-center justify-center rounded-full bg-zinc-100 font-bold text-zinc-600 text-sm">' + (globalIdx + 1) + '</div><h3 class="text-lg font-medium text-zinc-900 leading-relaxed pt-1">' + safeQuestion + '</h3></div><div class="space-y-3 pl-12">';

        q.options.forEach((opt, optIdx) => {
          const safeOpt = escapeHtml(opt);
          const isThisSelected = selected === opt;
          const isThisCorrect = q.correctAnswer === opt;
          
          let btnClass = 'w-full text-left px-5 py-4 rounded-xl border flex items-center justify-between transition-all ';
          let iconHtml = '';

          if (isAnswered) {
            if (isThisCorrect) {
              btnClass += 'border-green-500 bg-green-50 text-green-700 font-medium cursor-default';
              iconHtml = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-green-500"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>';
            } else if (isThisSelected) {
              btnClass += 'border-red-500 bg-red-50 text-red-700 font-medium cursor-default';
              iconHtml = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-red-500"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>';
            } else {
              btnClass += 'border-zinc-200 bg-zinc-50 opacity-50 cursor-default';
            }
          } else {
            btnClass += 'border-zinc-200 hover:border-zinc-300 bg-white hover:bg-zinc-50 cursor-pointer';
          }

          // Pass the option index instead of the string to avoid escaping/quote issues in the onclick handler
          html += '<button onclick="handleOptionSelect(' + globalIdx + ', ' + optIdx + ')" ' + (isAnswered ? 'disabled' : '') + ' class="' + btnClass + '"><span class="text-[15px]">' + safeOpt + '</span>' + iconHtml + '</button>';
        });

        html += '</div>';

        if (isAnswered) {
          html += '<div class="mt-6 pl-12 correct-anim"><div class="p-4 rounded-xl text-sm ' + (isCorrect ? 'bg-green-100/40 text-green-800' : 'bg-red-100/40 text-red-800') + '"><span class="font-bold mr-2">' + (isCorrect ? 'Correct!' : 'Incorrect.') + '</span>';
          if (safeExplanation) {
             html += '<span class="opacity-90 leading-snug inline-block mt-1">' + safeExplanation + '</span>';
          } else if (!isCorrect) {
             html += '<span class="opacity-90 inline-block mt-1">The correct answer is <span class="font-semibold">' + safeCorrectAnswer + '</span>.</span>';
          }
          html += '</div></div>';
        }

        qDiv.innerHTML = html;
        qsContainer.appendChild(qDiv);
      });

      // Pagination
      if (totalPages > 1) {
        paginationContainer.classList.remove('hidden');
        pageInfo.textContent = currentPage + ' of ' + totalPages;
        prevBtn.disabled = currentPage === 1;
        nextBtn.disabled = currentPage === totalPages;
      } else {
        paginationContainer.classList.add('hidden');
      }
    }

    window.handleOptionSelect = handleOptionSelect;

    prevBtn.addEventListener('click', () => {
      if (currentPage > 1) {
        currentPage--;
        renderQuestions();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });

    nextBtn.addEventListener('click', () => {
      if (currentPage < totalPages) {
        currentPage++;
        renderQuestions();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });

    renderQuestions();
    updateScore();
  </script>
</body>
</html>
